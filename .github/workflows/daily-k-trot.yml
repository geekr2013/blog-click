name: Daily original K-trot upload

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to YouTube"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-k-trot
  cancel-in-progress: false

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install free audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-dejavu-core
          pip install -r requirements.txt

      - name: Create today's original song and video
        run: python src/generate_song.py --date "$(date +%F)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-k-trot-${{ github.run_number }}
          path: build/
          retention-days: 7

      - name: Upload to YouTube
        if: ${{ github.event_name == 'schedule' || inputs.upload }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/upload_youtube.py

      - name: Save duplicate-prevention history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "Record daily original song"
          git push
