name: Naver Auto Post
on:
  schedule:
    - cron: "0 23,2,7 * * *" # 08:00, 11:00, 16:00 KST
  workflow_dispatch:
permissions:
  contents: write
jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate post package
        run: python scripts/generate_post_assets.py
      - name: Preflight check
        env:
          NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: python scripts/preflight_check.py
      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - name: Publish to Naver
        env:
          NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
        run: node scripts/naver_publish.mjs
      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outbox
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: generate auto post package"
          git push
