name: Quality Korean K-trot via free GPU

on:
  schedule:
    - cron: "0 0 * * 2,5"
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload to YouTube"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: quality-k-trot
  cancel-in-progress: true

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Seoul
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Require free GPU account
        run: |
          test -n "$KAGGLE_USERNAME"
          test -n "$KAGGLE_API_TOKEN"

      - name: Install lightweight orchestration tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto-cjk
          pip install -q -r requirements.txt kaggle

      - name: Prepare original Korean song
        run: python src/prepare_quality_song.py --date "$(date +%F)"

      - name: Create private Kaggle GPU job
        run: |
          mkdir -p .kaggle-kernel
          cp kaggle/kernel.py .kaggle-kernel/kernel.py
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          kernel = Path(".kaggle-kernel/kernel.py")
          request = Path("kaggle/request.json").read_bytes()
          text = kernel.read_text(encoding="utf-8")
          text = text.replace("__REQUEST_JSON_BASE64__", base64.b64encode(request).decode("ascii"))
          kernel.write_text(text, encoding="utf-8")
          username = os.environ["KAGGLE_USERNAME"]
          metadata = {
              "id": f"{username}/neon-k-trot-generator",
              "title": "Neon K-Trot Generator",
              "code_file": "kernel.py",
              "language": "python",
              "kernel_type": "script",
              "is_private": True,
              "enable_gpu": True,
              "enable_internet": True,
              "dataset_sources": [],
              "competition_sources": [],
              "kernel_sources": []
          }
          Path(".kaggle-kernel/kernel-metadata.json").write_text(json.dumps(metadata), encoding="utf-8")
          PY
          kaggle kernels push -p .kaggle-kernel --accelerator NvidiaTeslaT4

      - name: Wait for high-quality generation
        run: |
          for i in $(seq 1 45); do
            STATUS="$(kaggle kernels status "$KAGGLE_USERNAME/neon-k-trot-generator")"
            echo "$STATUS"
            if echo "$STATUS" | grep -qi complete; then exit 0; fi
            if echo "$STATUS" | grep -Eqi 'error|failed|cancel'; then exit 1; fi
            sleep 60
          done
          exit 1

      - name: Download only final song files
        run: |
          mkdir -p kaggle-output
          kaggle kernels output "$KAGGLE_USERNAME/neon-k-trot-generator" -p kaggle-output -o
          find kaggle-output -maxdepth 3 -type f
          if find kaggle-output -name ERROR.txt -print -quit | grep -q .; then
            cat "$(find kaggle-output -name ERROR.txt -print -quit)"
            exit 1
          fi
          test "$(find kaggle-output -type f | wc -l)" -le 5

      - name: Package exactly three-minute YouTube video
        run: |
          AUDIO="$(find kaggle-output -name quality_song.flac -print -quit)"
          REQUEST="$(find kaggle-output -name request.json -print -quit)"
          test -n "$AUDIO"
          test -n "$REQUEST"
          python src/package_quality_song.py --audio "$AUDIO" --request "$REQUEST"

      - name: Save review copy for 1 day
        uses: actions/upload-artifact@v4
        with:
          name: quality-k-trot-${{ github.run_number }}
          path: build/video.mp4
          retention-days: 1
          compression-level: 0

      - name: Upload to YouTube
        if: >-
          ${{ (github.event_name == 'schedule' || inputs.upload) &&
              env.YOUTUBE_CLIENT_ID != '' &&
              env.YOUTUBE_CLIENT_SECRET != '' &&
              env.YOUTUBE_REFRESH_TOKEN != '' }}
        run: python src/upload_youtube.py

      - name: Save compact history
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          catalog_path = Path("catalog.json")
          catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          request = json.loads(next(Path("kaggle-output").rglob("request.json")).read_text(encoding="utf-8"))
          if not any(song["title"] == request["title"] for song in catalog["songs"]):
              catalog["songs"].append({"date": request["date"], "title": request["title"]})
              catalog["songs"] = catalog["songs"][-500:]
              catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --cached --quiet || git commit -m "Record quality K-trot release"
          git push