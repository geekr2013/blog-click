name: Streamlit Deploy Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app/poc_meeting_minutes.py
          python -m py_compile streamlit_app.py

      - name: App entrypoint check
        run: |
          test -f streamlit_app.py
          test -f .streamlit/config.toml
          python - <<'PY'
          import importlib
          importlib.import_module("streamlit_app")
          print("streamlit_app import ok")
          PY

      - name: Streamlit smoke check
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("streamlit_app.py")
          text = p.read_text(encoding="utf-8")
          assert "app.poc_meeting_minutes" in text
          print("entrypoint wiring ok")
          PY
