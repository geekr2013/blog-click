name: Auto Blog Growth Planner

on:
  schedule:
    - cron: "15 21 * * *" # 06:15 KST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate plan
        run: python scripts/auto_growth.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weekly_plan.json REPORT.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh automated weekly blog plan"
          git push
